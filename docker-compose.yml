version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: school_postgres_db
    restart: always
    environment:
      POSTGRES_USER: school_admin
      POSTGRES_PASSWORD: school_password
      POSTGRES_DB: school_management_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: school_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
